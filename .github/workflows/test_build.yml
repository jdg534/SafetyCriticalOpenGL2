name: Test build.

on:
    push:
        paths:
            - 'source/**'
            - '**.yml'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-the-code:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
                working-directory: ./
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                submodules: true 
            - run: sudo apt update --quiet
            - name: Get general build tools.
              run: sudo apt install --quiet -y clang-tidy cmake g++ ninja-build jq build-essential
            - name: Get build tools for dependencies.
              run: sudo apt install --quiet -y libwayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
            - run: git submodule update --init --recursive
            - run: cmake --preset=ci-static-analysis
            - name: Test the code builds.
              run: cmake --build ./ci_static_analysis
